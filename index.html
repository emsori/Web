<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SA-MP Mapping Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
      margin-top: 4px;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2d3148;
      background: #12141f;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-color: transparent;
      color: white;
    }

    .tab-btn:hover:not(.active) { border-color: #6366f1; color: #a5b4fc; }

    .drop-zone {
      border: 2px dashed #2d3148;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #12141f;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #6366f1;
      background: #1a1c2e;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 34px; margin-bottom: 10px; }

    .drop-text { font-size: 14px; color: #94a3b8; }
    .drop-text span { color: #6366f1; font-weight: 600; }
    .drop-hint { font-size: 12px; color: #475569; margin-top: 5px; }

    .file-selected { background: #1a2e1a; border-color: #22c55e; border-style: solid; }

    .stats {
      margin-top: 20px;
      background: #12141f;
      border-radius: 10px;
      padding: 16px 20px;
      display: none;
    }

    .stats.visible { display: block; }

    .stats-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      background: #1a1d2e;
      border-radius: 8px;
      font-size: 12px;
    }

    .stat-label { color: #94a3b8; }
    .stat-value { color: #22c55e; font-weight: 700; font-family: monospace; font-size: 13px; }
    .stat-total { grid-column: span 2; background: #1e2235; }
    .stat-total .stat-value { color: #a78bfa; font-size: 14px; }

    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-convert {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-convert:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-convert:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-download { background: #22c55e; color: white; display: none; }
    .btn-download.visible { display: block; }
    .btn-download:hover { background: #16a34a; transform: translateY(-1px); }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 10px;
    }

    .info-boxes {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .info-boxes.two-col { grid-template-columns: 1fr 1fr; }

    .info-box {
      background: #12141f;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid #1e2235;
    }

    .info-box .arrow { font-size: 10px; color: #64748b; margin: 3px 0; }
    .info-box .from { font-size: 10px; color: #f87171; font-family: monospace; word-break: break-all; }
    .info-box .to { font-size: 10px; color: #22c55e; font-family: monospace; word-break: break-all; }

    .footer { margin-top: 20px; font-size: 12px; color: #334155; text-align: center; }

    .error-msg {
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 14px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .mode-panel { display: none; }
    .mode-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🗺️</div>
      <h1>SA-MP Mapping Converter</h1>
    </div>
    <p class="subtitle">Konversi mapping & textdraw SA-MP otomatis. Support Incognito Streamer Plugin.</p>

    <div class="mode-tabs">
      <button class="tab-btn active" onclick="switchMode('object')" id="tabObject">🧱 Object Converter</button>
      <button class="tab-btn" onclick="switchMode('textdraw')" id="tabTextdraw">📝 TextDraw Converter</button>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pwn,.inc,.txt" />
      <div class="drop-icon" id="dropIcon">📂</div>
      <div class="drop-text" id="dropText">Drop file <span>.pwn</span> di sini atau <span>klik untuk pilih</span></div>
      <div class="drop-hint" id="dropHint">Supports: .pwn, .inc, .txt</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="stats" id="stats">
      <div class="stats-title">Hasil Konversi</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <button class="btn btn-convert" id="btnConvert" disabled>Konversi File</button>
    <button class="btn btn-download" id="btnDownload">⬇ Download Hasil Konversi</button>

    <div id="infoPanel">
      <div class="section-title" id="infoTitle">Yang Dikonversi</div>
      <div class="info-boxes" id="infoBoxes"></div>
    </div>
  </div>

  <div class="footer">SA-MP Mapping Converter • Mevitra Pride RP Tools</div>

  <script>
    let fileContent = null;
    let fileName = null;
    let convertedContent = null;
    let currentMode = 'object';

    const MODES = {
      object: {
        infoBoxes: [
          ['CreateObject', 'CreateDynamicObject'],
          ['SetObjectMaterial', 'SetDynamicObjectMaterial'],
          ['SetObjectMaterialText', 'SetDynamicObjectMaterialText'],
        ],
        twoCol: false,
        convert: convertObjects
      },
      textdraw: {
        infoBoxes: [
          ['TextDrawCreate', 'CreatePlayerTextDraw'],
          ['TextDrawLetterSize', 'PlayerTextDrawLetterSize'],
          ['TextDrawTextSize', 'PlayerTextDrawTextSize'],
          ['TextDrawAlignment', 'PlayerTextDrawAlignment'],
          ['TextDrawColor', 'PlayerTextDrawColor'],
          ['TextDrawUseBox', 'PlayerTextDrawUseBox'],
          ['TextDrawBoxColor', 'PlayerTextDrawBoxColor'],
          ['TextDrawSetShadow', 'PlayerTextDrawSetShadow'],
          ['TextDrawSetOutline', 'PlayerTextDrawSetOutline'],
          ['TextDrawBackgroundColor', 'PlayerTextDrawBackgroundColor'],
          ['TextDrawFont', 'PlayerTextDrawFont'],
          ['TextDrawSetProportional', 'PlayerTextDrawSetProportional'],
          ['TextDrawSetSelectable', 'PlayerTextDrawSetSelectable'],
          ['TextDrawDestroy', 'PlayerTextDrawDestroy'],
          ['TextDrawShowForPlayer', 'PlayerTextDrawShow'],
          ['TextDrawHideForPlayer', 'PlayerTextDrawHide'],
        ],
        twoCol: true,
        convert: convertTextdraws
      }
    };

    function renderInfoBoxes() {
      const mode = MODES[currentMode];
      const container = document.getElementById('infoBoxes');
      container.innerHTML = '';
      container.className = 'info-boxes' + (mode.twoCol ? ' two-col' : '');
      mode.infoBoxes.forEach(([from, to]) => {
        container.innerHTML += `
          <div class="info-box">
            <div class="from">${from}</div>
            <div class="arrow">↓</div>
            <div class="to">${to}</div>
          </div>`;
      });
    }

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('tabObject').className = 'tab-btn' + (mode === 'object' ? ' active' : '');
      document.getElementById('tabTextdraw').className = 'tab-btn' + (mode === 'textdraw' ? ' active' : '');
      renderInfoBoxes();
      resetUI();
    }

    function resetUI() {
      document.getElementById('stats').classList.remove('visible');
      document.getElementById('btnDownload').classList.remove('visible');
      document.getElementById('errorMsg').classList.remove('visible');
      convertedContent = null;
      if (!fileContent) return;
      document.getElementById('btnConvert').disabled = false;
    }

    renderInfoBoxes();

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const btnConvert = document.getElementById('btnConvert');
    const btnDownload = document.getElementById('btnDownload');
    const stats = document.getElementById('stats');
    const errorMsg = document.getElementById('errorMsg');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        fileContent = e.target.result;
        dropZone.classList.add('file-selected');
        document.getElementById('dropIcon').textContent = '✅';
        document.getElementById('dropText').innerHTML = `<span>${file.name}</span> siap dikonversi`;
        document.getElementById('dropHint').textContent = `${(file.size / 1024).toFixed(1)} KB`;
        btnConvert.disabled = false;
        resetUI();
      };
      reader.readAsText(file, 'utf-8');
    }

    btnConvert.addEventListener('click', () => {
      if (!fileContent) return;
      try {
        const result = MODES[currentMode].convert(fileContent);
        convertedContent = result.content;
        const grid = document.getElementById('statsGrid');
        grid.innerHTML = '';
        let total = 0;
        result.stats.forEach(([label, count]) => {
          total += count;
          grid.innerHTML += `
            <div class="stat-item">
              <span class="stat-label">${label}</span>
              <span class="stat-value">${count}</span>
            </div>`;
        });
        grid.innerHTML += `
          <div class="stat-item stat-total">
            <span class="stat-label">Total Perubahan</span>
            <span class="stat-value">${total}</span>
          </div>`;
        stats.classList.add('visible');
        btnDownload.classList.add('visible');
        errorMsg.classList.remove('visible');
      } catch (e) {
        errorMsg.textContent = 'Error: ' + e.message;
        errorMsg.classList.add('visible');
      }
    });

    btnDownload.addEventListener('click', () => {
      if (!convertedContent) return;
      const baseName = fileName.replace(/\.[^.]+$/, '');
      const outName = baseName + '_converted.pwn';
      const blob = new Blob([convertedContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = outName; a.click();
      URL.revokeObjectURL(url);
    });

    // ─── MODE 1: Object Converter ───────────────────────────────────────────────

    function convertObjects(content) {
      let result = content;
      let countCO = 0, countSOM = 0, countSOMT = 0;

      // CreateObject(model, x, y, z, rx, ry, rz, DrawDist)
      // → CreateDynamicObject(model, x, y, z, rx, ry, rz, -1, -1, -1, DrawDist, DrawDist)
      result = result.replace(/(?<![A-Za-z0-9_])CreateObject\(([^)]+)\)/g, (match, args) => {
        const parts = splitArgs(args);
        if (parts.length === 8) {
          countCO++;
          const [model, x, y, z, rx, ry, rz, drawDist] = parts;
          return `CreateDynamicObject(${model}, ${x}, ${y}, ${z}, ${rx}, ${ry}, ${rz}, -1, -1, -1, ${drawDist}, ${drawDist})`;
        }
        return match;
      });

      // SetObjectMaterial → SetDynamicObjectMaterial
      result = result.replace(/(?<![A-Za-z0-9_])SetObjectMaterial\(/g, () => { countSOM++; return 'SetDynamicObjectMaterial('; });

      // SetObjectMaterialText(obj, "text", index, ...) → SetDynamicObjectMaterialText(obj, index, "text", ...)
      result = result.replace(
        /(?<![A-Za-z0-9_])SetObjectMaterialText\(([^,]+),\s*("(?:[^"\\]|\\.)*"),\s*(\d+),\s*([^;]+)\)/g,
        (match, obj, text, index, rest) => {
          countSOMT++;
          return `SetDynamicObjectMaterialText(${obj.trim()}, ${index}, ${text}, ${rest.trim()})`;
        }
      );

      return {
        content: result,
        stats: [
          ['CreateObject', countCO],
          ['SetObjectMaterial', countSOM],
          ['SetObjectMaterialText', countSOMT],
        ]
      };
    }

    // ─── MODE 2: TextDraw Converter ──────────────────────────────────────────────
    // Converts global TextDraw → PlayerTextDraw (adds `playerid` parameter)

    function convertTextdraws(content) {
      let result = content;
      let counts = {};

      function count(key) { counts[key] = (counts[key] || 0) + 1; }

      // Variable type: Text: → PlayerText:
      result = result.replace(/(?<![A-Za-z0-9_])Text:/g, () => { count('Text: tag'); return 'PlayerText:'; });

      // TextDrawCreate(x, y, text) → CreatePlayerTextDraw(playerid, x, y, text)
      result = result.replace(/(?<![A-Za-z0-9_])TextDrawCreate\(/g, () => { count('TextDrawCreate'); return 'CreatePlayerTextDraw(playerid, '; });

      // TextDrawDestroy(td) → PlayerTextDrawDestroy(playerid, td)
      result = result.replace(/(?<![A-Za-z0-9_])TextDrawDestroy\(([^)]+)\)/g, (m, td) => {
        count('TextDrawDestroy'); return `PlayerTextDrawDestroy(playerid, ${td.trim()})`;
      });

      // Functions with pattern: TextDrawXxx(td, ...) → PlayerTextDrawXxx(playerid, td, ...)
      const simpleConversions = [
        'TextDrawLetterSize',
        'TextDrawTextSize',
        'TextDrawAlignment',
        'TextDrawColor',
        'TextDrawUseBox',
        'TextDrawBoxColor',
        'TextDrawSetShadow',
        'TextDrawSetOutline',
        'TextDrawBackgroundColor',
        'TextDrawFont',
        'TextDrawSetProportional',
        'TextDrawSetSelectable',
        'TextDrawSetString',
        'TextDrawSetPreviewModel',
        'TextDrawSetPreviewRot',
        'TextDrawSetPreviewVehCol',
      ];

      simpleConversions.forEach(fn => {
        const playerFn = fn.replace('TextDraw', 'PlayerTextDraw');
        const re = new RegExp(`(?<![A-Za-z0-9_])${fn}\\(([^,]+),`, 'g');
        result = result.replace(re, (match, td) => {
          count(fn); return `${playerFn}(playerid, ${td.trim()},`;
        });
      });

      // TextDrawShowForPlayer(playerid, td) → PlayerTextDrawShow(playerid, td)
      result = result.replace(/(?<![A-Za-z0-9_])TextDrawShowForPlayer\(([^,]+),\s*([^)]+)\)/g, (m, pid, td) => {
        count('TextDrawShowForPlayer'); return `PlayerTextDrawShow(${pid.trim()}, ${td.trim()})`;
      });

      // TextDrawHideForPlayer(playerid, td) → PlayerTextDrawHide(playerid, td)
      result = result.replace(/(?<![A-Za-z0-9_])TextDrawHideForPlayer\(([^,]+),\s*([^)]+)\)/g, (m, pid, td) => {
        count('TextDrawHideForPlayer'); return `PlayerTextDrawHide(${pid.trim()}, ${td.trim()})`;
      });

      // TextDrawShowForAll / TextDrawHideForAll — warn in stats
      const showAll = (result.match(/TextDrawShowForAll\(/g) || []).length;
      const hideAll = (result.match(/TextDrawHideForAll\(/g) || []).length;
      if (showAll > 0) counts['⚠ TextDrawShowForAll (manual)'] = showAll;
      if (hideAll > 0) counts['⚠ TextDrawHideForAll (manual)'] = hideAll;

      const statsArr = Object.entries(counts).map(([k, v]) => [k, v]);
      return { content: result, stats: statsArr };
    }

    // ─── Helper ──────────────────────────────────────────────────────────────────

    function splitArgs(str) {
      const parts = [];
      let depth = 0, current = '';
      for (const ch of str) {
        if (ch === '(' || ch === '[') depth++;
        else if (ch === ')' || ch === ']') depth--;
        else if (ch === ',' && depth === 0) { parts.push(current.trim()); current = ''; continue; }
        current += ch;
      }
      if (current.trim()) parts.push(current.trim());
      return parts;
    }
  </script>
</body>
</html>
